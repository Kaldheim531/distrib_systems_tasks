name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GROUP: "332"
  STUDENT_ID: "s14"
  WEEK: "14"
  IMAGE_NAME: "tasks-s14"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: |
          flake8 weeks/week-10/app weeks/week-11/app --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test
        run: |
          make test WEEK=10
          make test WEEK=11
          make test WEEK=12
          make test WEEK=13
          make test WEEK=14

      - name: Build Docker image
        run: |
          docker build -t ${IMAGE_NAME}:${GITHUB_SHA} -f weeks/week-10/Dockerfile weeks/week-10
          docker tag ${IMAGE_NAME}:${GITHUB_SHA} ${IMAGE_NAME}:latest

      - name: Save Docker image artifact
        run: |
          mkdir -p artifacts
          docker save ${IMAGE_NAME}:latest -o artifacts/${IMAGE_NAME}.tar
          cp weeks/week-10/report.md artifacts/week-10-report.md
          cp weeks/week-14/questions.md artifacts/week-14-questions.md

      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tasks-s14-build
          path: artifacts

      - name: Publish image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "docker login uses secrets in real CI"
          echo "docker push ${IMAGE_NAME}:latest"
