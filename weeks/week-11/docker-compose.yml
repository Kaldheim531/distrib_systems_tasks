services:
  reviews-svc-s14:
    build:
      context: .
      dockerfile: Dockerfile
    image: reviews-svc-s14:latest
    environment:
      PROJECT_CODE: reviews-s14
      REDIS_HOST: redis
    ports:
      - "8149:8149"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8149/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - reviews-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - reviews-net

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      reviews-svc-s14:
        condition: service_healthy
    networks:
      - reviews-net

networks:
  reviews-net:
    driver: bridge
