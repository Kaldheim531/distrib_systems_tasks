services:
  items-svc-s14:
    build:
      context: .
      args:
        SERVICE_DIR: services/items
    command: uvicorn app.main:app --host 0.0.0.0 --port 8161
    ports:
      - "8161:8161"

  notify-svc-s14:
    build:
      context: .
      args:
        SERVICE_DIR: services/notify
    command: uvicorn app.main:app --host 0.0.0.0 --port 8170
    ports:
      - "8170:8170"

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - items-svc-s14
      - notify-svc-s14
