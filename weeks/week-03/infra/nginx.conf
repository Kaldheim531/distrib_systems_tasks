
upstream notifications_backend {
    server 127.0.0.1:8000;
}


upstream other_backend {
    server 127.0.0.1:8001;
}

server {
    listen 8080;
    server_name localhost;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    
    location /api/notifications {
        proxy_pass http://notifications_backend/notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
    location /api/other {
        proxy_pass http://other_backend/other;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
    location / {
        return 200 'API Gateway работает. Используйте /api/notifications или /api/other\n';
        add_header Content-Type text/plain;
    }
}